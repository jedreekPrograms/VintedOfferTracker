version: "3.9"

services:
  postgres:
    image: postgres:17
    container_name: flipbot-postgres

    environment:
      POSTGRES_DB: flipbot
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

    restart: unless-stopped

volumes:
  postgres_data: